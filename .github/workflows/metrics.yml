name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # 每天凌晨自动运行一次
  workflow_dispatch: # 支持手动触发
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: 1nuoiscute
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Shanghai
          
          # --- 核心：仓库过滤与语言去噪 ---
          plugin_languages: yes
          plugin_languages_skipped: 1nuoiscute.github.io, 1nuo-blog-twikoo, 1nuo-blog, 1nuoiscute  # 这里填入你不想要的仓库名
          plugin_languages_limit: 8
          plugin_languages_details: percentage, lines
          plugin_languages_indepth: yes # 开启深度分析，抓取 LeetCode 仓库里的具体逻辑
          
          # --- 修复习惯统计 (Habits) ---
          plugin_habits: yes
          plugin_habits_from: 100       # 抓取最近100个事件，防止数据太少报错
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          
          # --- 修复成就统计 (Achievements) ---
          plugin_achievements: yes
          plugin_achievements_threshold: X # 极低门槛模式，只要有活动就点亮勋章
          plugin_achievements_display: compact 
          
          # --- 其他数据 ---
          plugin_lines: yes
          
          # 重新排序，把你最在意的语言占比放在最上面
          config_order: base.header, languages, habits, lines, achievements
