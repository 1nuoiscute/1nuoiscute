name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # 每天凌晨自动运行一次
  workflow_dispatch: # 支持手动触发
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
     - uses: lowlighter/metrics@latest
       with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: 1nuoiscute
          template: classic
          # 增加 base_indepth，强制基础数据也深度抓取私有库
          base: header, activity, community, repositories, metadata
          base_indepth: yes 
          config_timezone: Asia/Shanghai
          
          # --- 核心：强制抓取私有库配置 ---
          repositories_affiliations: owner 
          plugin_languages: yes
          plugin_languages_skipped: 1nuoiscute.github.io, 1nuo-blog-twikoo, 1nuo-blog, 1nuoiscute
          plugin_languages_limit: 8
          plugin_languages_details: percentage, lines
          plugin_languages_indepth: yes # 深度分析私有库代码
          
          # --- 习惯与成就 (增加容错) ---
          plugin_habits: yes
          plugin_habits_from: 50        # 降低样本数，防止超时
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          
          plugin_achievements: yes
          plugin_achievements_threshold: X
          plugin_achievements_display: compact
          
          plugin_lines: yes
          
          # 打开 Debug 模式，如果这次还失败，去 Actions 日志里能看到具体原因
          debug: yes
